<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Zappar AR Demo - Standalone</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #ar-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      button {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        padding: 16px 32px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        z-index: 1000;
        transition: all 0.3s ease;
      }

      #start-button {
        top: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      #start-button:hover {
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <button id="start-button">Start AR</button>
      <canvas id="ar-canvas"></canvas>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- Zappar ThreeJS CDN -->
    <script src="https://libs.zappar.com/zappar-threejs/4.1.0/zappar-threejs.js"></script>

    <script>
      const canvas = document.querySelector("#ar-canvas");
      const startButton = document.querySelector("#start-button");

      if (!canvas || !startButton) {
        throw new Error("Canvas or start button not found");
      }

      // 1. 创建 Three.js renderer
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // 2. 告诉 Zappar 使用这个 WebGL 上下文
      ZapparThree.glContextSet(renderer.getContext());

      // 3. 创建 Zappar Camera
      const camera = new ZapparThree.Camera();

      // 场景 + 把相机背景设为摄像头画面
      const scene = new THREE.Scene();
      scene.background = camera.backgroundTexture;

      // 4. 创建 World Tracker + 用户放置组
      const worldTracker = new ZapparThree.WorldTracker();
      const placementGroup = new ZapparThree.UserPlacementAnchorGroup(
        camera,
        worldTracker,
        renderer
      );
      // 只允许在地面放置
      placementGroup.placeOnGround = true;
      placementGroup.placeOnWalls = false;
      placementGroup.placeOnMeshes = false;

      // 默认不在放置状态
      placementGroup.placementMode = false;
      scene.add(placementGroup);

      // 5. 放置一个简单的彩色方块
      const cubeGeometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
      const cubeMaterial = new THREE.MeshNormalMaterial();
      const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
      cube.position.set(0, 0.3, 0); // 稍微抬高，避免与平面重合
      placementGroup.add(cube);

      // 6. 窗口 resize 时更新画布大小
      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ===== 点击屏幕在地面种植（最终稳定版本）=====
      let isPlacing = false;

      // 使用 pointerdown（比 click 在移动端更稳定）
      canvas.addEventListener("pointerdown", () => {
        if (isPlacing) return;

        isPlacing = true;
        placementGroup.placementMode = true;
      });

      // 放置完成后立刻锁定，防止漂移
      placementGroup.addEventListener("placed", () => {
        placementGroup.placementMode = false;
        isPlacing = false;
      });

      // 7. 启动 AR：需要用户点击按钮 → 请求摄像头权限
      startButton.addEventListener("click", () => {
        ZapparThree.permissionRequestUI().then((granted) => {
          if (granted) {
            // 开始使用摄像头
            camera.start();

            // 隐藏开始按钮
            startButton.style.display = "none";

            // 开始渲染循环
            animate();
          } else {
            // 如果拒绝，就显示 Zappar 提供的默认提示 UI
            ZapparThree.permissionDeniedUI();
          }
        });
      });

      // 7. 渲染循环
      function animate() {
        requestAnimationFrame(animate);

        // 让方块转动，方便观察定位
        cube.rotation.y += 0.01;

        // 更新相机的帧（把最新摄像头画面塞进背景纹理）
        camera.updateFrame(renderer);

        // 用 Zappar 相机渲染场景
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
