<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Zappar AR Demo - Standalone</title>

    <!-- Styles -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="ar-canvas"></canvas>
      <div id="status-indicator">保持手机竖直...</div>
      <button id="reset-button" aria-label="重置位置">
        <img src="./icons/reset.svg" alt="" role="presentation" />
      </button>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- Zappar ThreeJS CDN -->
    <script src="https://libs.zappar.com/zappar-threejs/4.2.0/zappar-threejs.js"></script>

    <!-- VConsole CDN -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Utilities -->
    <script src="./utils/SplashScreenRemover.js"></script>
    <script src="./utils/DeviceOrientationChecker.js"></script>
    <script src="./utils/CenterObject.js"></script>

    <!-- Services -->
    <script src="./services/AssetService.js"></script>

    <!-- Mesh Creators -->
    <script src="./creators/ImageMeshCreator.js"></script>
    <script src="./creators/TextMeshCreator.js"></script>
    <script src="./creators/AudioMeshCreator.js"></script>

    <!-- Core Components -->
    <script src="./core/LocationManager.js"></script>
    <script src="./core/AssetManager.js"></script>
    <script src="./core/ARContent.js"></script>

    <!-- Main Application -->
    <script src="./app.js"></script>
  </body>
</html>
