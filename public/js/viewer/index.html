    <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
    <link

  <body>

    <div id="loading">
      <div>正在初始化 Cesium...</div>
      <div class="spinner"></div>

    <div id="controls">
      <button onclick="resetCamera()" title="重置视角">

          height="20"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"

          <path
            d="M4 12C4 7.58172 7.58172 4 12 4C14.5264 4 16.7792 5.17108 18.2454 7M20 12C20 16.4183 16.4183 20 12 20C9.47362 20 7.22082 18.8289 5.75463 17M20 4V7M20 7H17M20 7L20 7ZM4 20V17M4 17H7M4 17L4 17Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>

    <script type="module" src="app.js"></script>
