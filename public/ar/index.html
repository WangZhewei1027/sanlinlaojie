<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Zappar AR Demo - Standalone</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #ar-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      button {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        padding: 16px 32px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        z-index: 1000;
        transition: all 0.3s ease;
      }

      #start-button {
        top: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      #start-button:hover {
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <button id="start-button">Start AR</button>
      <canvas id="ar-canvas"></canvas>
    </div>

    <!-- VConsole CDN -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>

    <!-- Three.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- Zappar ThreeJS CDN -->
    <script src="https://libs.zappar.com/zappar-threejs/4.1.0/zappar-threejs.js"></script>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // 初始化 VConsole
      var vConsole = new window.VConsole();

      // Supabase 配置
      const SUPABASE_URL = "https://mkdfezaufjhrfjkfqlbj.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rZGZlemF1ZmpocmZqa2ZxbGJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyMDI2NzksImV4cCI6MjA4MDc3ODY3OX0.YvoVQP5k61rl1dbm-y7O-MQCsfke3rnSIzhWvbVGQdU";
      const DEFAULT_WORKSPACE = "sanlinlaojie";

      // 初始化 Supabase
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const canvas = document.querySelector("#ar-canvas");
      const startButton = document.querySelector("#start-button");

      if (!canvas || !startButton) {
        throw new Error("Canvas or start button not found");
      }

      // 1. 创建 Three.js renderer
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // 2. 告诉 Zappar 使用这个 WebGL 上下文
      ZapparThree.glContextSet(renderer.getContext());

      // 3. 创建 Zappar Camera
      const camera = new ZapparThree.Camera();
      // 场景 + 把相机背景设为摄像头画面
      const scene = new THREE.Scene();
      scene.background = camera.backgroundTexture;

      // 4. 创建 World Tracker + 用户放置组
      const worldTracker = new ZapparThree.WorldTracker();
      const placementGroup = new ZapparThree.UserPlacementAnchorGroup(
        camera,
        worldTracker,
        renderer
      );
      placementGroup.placeOnGround = true; // 允许基于地面的放置
      placementGroup.placeButtonText = "Place";
      scene.add(placementGroup);

      // 使用官方提供的初始化 UI，引导用户左右移动手机
      const worldTrackerUI = new ZapparThree.WorldTrackerUI(
        renderer.domElement
      );

      // 5. 存储已加载的资产
      let assets = [];
      let assetMarkers = [];
      let userLocation = null;

      // 获取用户当前位置
      function getUserLocation() {
        return new Promise((resolve, reject) => {
          console.log("Checking geolocation support...");

          if (!navigator.geolocation) {
            const error = new Error("Geolocation not supported");
            console.log("❌ Geolocation API not available");
            reject(error);
            return;
          }

          console.log("✅ Geolocation API available");
          console.log("Requesting location permission...");

          navigator.geolocation.getCurrentPosition(
            (position) => {
              console.log(
                `✅ Location obtained: ${position.coords.latitude.toFixed(
                  6
                )}, ${position.coords.longitude.toFixed(6)}`
              );
              resolve({
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
                altitude: position.coords.altitude || 0,
              });
            },
            (error) => {
              let errorMsg = "";
              switch (error.code) {
                case error.PERMISSION_DENIED:
                  errorMsg = "用户拒绝了位置权限请求";
                  break;
                case error.POSITION_UNAVAILABLE:
                  errorMsg = "位置信息不可用";
                  break;
                case error.TIMEOUT:
                  errorMsg = "获取位置超时";
                  break;
                default:
                  errorMsg = "未知错误";
              }
              console.log(
                `❌ Location error: ${errorMsg} (code: ${error.code})`
              );
              reject(new Error(errorMsg));
            },
            {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 0,
            }
          );
        });
      }

      // 从 Supabase 获取资产数据
      async function fetchAssets() {
        try {
          console.log("Fetching workspace...");

          // 首先获取 workspace ID
          const { data: workspaces, error: wsError } = await supabase
            .from("workspace")
            .select("id")
            .eq("name", DEFAULT_WORKSPACE)
            .single();

          if (wsError) {
            console.log(`❌ Workspace error: ${wsError.message}`);
            throw wsError;
          }

          if (!workspaces) {
            console.log(`⚠️ Workspace not found: ${DEFAULT_WORKSPACE}`);
            return [];
          }

          console.log(`✅ Workspace found: ${workspaces.id}`);
          console.log("Fetching assets...");

          // 获取该 workspace 的所有资产（带位置信息）
          const { data, error } = await supabase
            .from("asset")
            .select("id, file_type, file_url, metadata")
            .contains("workspace_id", [workspaces.id])
            .not("location", "is", null)
            .eq("file_type", "image");

          if (error) {
            console.log(`❌ Asset error: ${error.message}`);
            throw error;
          }

          console.log(`✅ Loaded ${data?.length || 0} assets from Supabase`);
          return data || [];
        } catch (error) {
          console.log(`❌ Error fetching assets: ${error.message}`);
          return [];
        }
      }

      // 将 GPS 坐标转换为相对于用户位置的 3D 坐标
      function gpsToLocalCoordinates(assetLat, assetLon, assetAlt) {
        if (!userLocation) return { x: 0, y: 0, z: 0 };

        // 简化的平面投影（适用于小范围）
        const latDiff = assetLat - userLocation.latitude;
        const lonDiff = assetLon - userLocation.longitude;
        const altDiff = (assetAlt || 0) - userLocation.altitude;

        // 1度纬度 ≈ 111km, 1度经度 ≈ 111km * cos(latitude)
        const latToMeters = 111000;
        const lonToMeters =
          111000 * Math.cos((userLocation.latitude * Math.PI) / 180);

        return {
          x: lonDiff * lonToMeters, // 东西方向
          y: altDiff, // 高度
          z: -latDiff * latToMeters, // 南北方向（Three.js Z轴向前为负）
        };
      }

      // 创建图片平面
      function createImagePlane(imageUrl, position) {
        const textureLoader = new THREE.TextureLoader();
        textureLoader.crossOrigin = "anonymous";

        const geometry = new THREE.PlaneGeometry(1, 1);
        const material = new THREE.MeshBasicMaterial({
          map: null,
          side: THREE.DoubleSide,
          transparent: true,
        });

        const plane = new THREE.Mesh(geometry, material);
        plane.position.set(position.x, position.y + 1.5, position.z);

        // 让平面始终面向相机
        plane.lookAt(0, position.y + 1.5, 0);

        // 异步加载纹理
        textureLoader.load(
          imageUrl,
          (texture) => {
            material.map = texture;
            material.needsUpdate = true;

            // 根据图片比例调整平面大小
            const aspect = texture.image.width / texture.image.height;
            if (aspect > 1) {
              plane.scale.set(aspect, 1, 1);
            } else {
              plane.scale.set(1, 1 / aspect, 1);
            }
          },
          undefined,
          (error) => {
            console.error("Error loading texture:", error);
          }
        );

        return plane;
      }

      // 加载并显示资产
      async function loadAndDisplayAssets() {
        try {
          console.log("🚀 Starting asset loading...");

          // 获取用户位置
          userLocation = await getUserLocation();
          console.log(
            `📍 User location: ${userLocation.latitude.toFixed(
              6
            )}, ${userLocation.longitude.toFixed(
              6
            )}, alt: ${userLocation.altitude.toFixed(1)}m`
          );

          // 获取资产
          assets = await fetchAssets();

          if (assets.length === 0) {
            console.log("⚠️ No assets found in database");
            return;
          }

          // 清除旧的标记
          assetMarkers.forEach((marker) => {
            scene.remove(marker);
          });
          assetMarkers = [];

          console.log(`Processing ${assets.length} assets...`);

          // 为每个资产创建 AR 标记
          assets.forEach((asset) => {
            if (!asset.metadata?.latitude || !asset.metadata?.longitude) {
              console.log(`⚠️ Asset ${asset.id} missing GPS data`);
              return;
            }

            const position = gpsToLocalCoordinates(
              asset.metadata.latitude,
              asset.metadata.longitude,
              asset.metadata.height || 0
            );

            // 只显示在合理范围内的资产（例如 1km 内）
            const distance = Math.sqrt(
              position.x ** 2 + position.y ** 2 + position.z ** 2
            );

            if (distance > 1000) {
              console.log(
                `⚠️ Asset ${asset.id} too far: ${distance.toFixed(0)}m`
              );
              return;
            }

            console.log(
              `✅ Placing asset ${asset.id} at (${position.x.toFixed(
                1
              )}, ${position.y.toFixed(1)}, ${position.z.toFixed(
                1
              )}) - ${distance.toFixed(0)}m away`
            );

            const marker = createImagePlane(asset.file_url, position);
            scene.add(marker);
            assetMarkers.push(marker);
          });

          console.log(`✅ Displayed ${assetMarkers.length} assets in AR`);
        } catch (error) {
          console.log(`❌ Error: ${error.message}`);
          alert(
            `无法获取位置信息：${error.message}\n\n请确保：\n1. 允许浏览器访问位置\n2. 手机GPS已开启\n3. 使用HTTPS连接`
          );
        }
      }

      // 6. 窗口 resize 时更新画布大小
      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // 7. 启动 AR：需要用户点击按钮 → 请求摄像头权限
      startButton.addEventListener("click", async () => {
        console.log("👆 Start button clicked");
        console.log(`🌐 Protocol: ${window.location.protocol}`);
        console.log(`🔒 Secure context: ${window.isSecureContext}`);

        ZapparThree.permissionRequestUI().then(async (granted) => {
          if (granted) {
            console.log("✅ Camera permission granted");

            // 开始使用摄像头
            camera.start();

            // 开启放置模式，让用户在平面上放置内容
            placementGroup.placementMode = true;

            // 隐藏开始按钮
            startButton.style.display = "none";

            // 加载并显示资产
            await loadAndDisplayAssets();

            // 开始渲染循环
            animate();
          } else {
            console.log("❌ Camera permission denied");
            // 如果拒绝，就显示 Zappar 提供的默认提示 UI
            ZapparThree.permissionDeniedUI();
          }
        });
      });

      // 8. 渲染循环
      function animate() {
        requestAnimationFrame(animate);

        // 世界跟踪未初始化时显示官方提示 UI，引导左右移动
        if (!placementGroup.ready) {
          worldTrackerUI.show();
          worldTrackerUI.update();
        } else {
          worldTrackerUI.hide();
        }

        // 让所有图片平面面向相机
        assetMarkers.forEach((marker) => {
          marker.lookAt(camera.position);
        });

        // 更新相机的帧（把最新摄像头画面塞进背景纹理）
        camera.updateFrame(renderer);

        // 用 Zappar 相机渲染场景
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
